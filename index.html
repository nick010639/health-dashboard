<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>健康仪表板 - HM</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    h1 { color: #fff; font-size: 28px; }
    .refresh-btn {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.3); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .card h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .card .value {
      font-size: 32px;
      font-weight: 700;
      color: #333;
    }
    .card .unit { font-size: 16px; color: #999; font-weight: 400; }
    .card .sub { font-size: 13px; color: #999; margin-top: 4px; }
    .card .sub.success { color: #10b981; }
    .card .sub.warning { color: #f59e0b; }

    .chart-card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 24px;
    }
    .chart-card h3 {
      font-size: 16px;
      color: #333;
      margin-bottom: 16px;
    }

    .section-title {
      color: #fff;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }
    .nutrition-item {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }
    .nutrition-item .label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }
    .nutrition-item .value {
      font-size: 20px;
      font-weight: 700;
    }
    .nutrition-item .value.protein { color: #ef4444; }
    .nutrition-item .value.carb { color: #f59e0b; }
    .nutrition-item .value.fat { color: #3b82f6; }
    .nutrition-item .unit { font-size: 12px; color: #999; }

    .meal-list { list-style: none; }
    .meal-list li {
      background: rgba(255,255,255,0.1);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      color: #fff;
    }
    .meal-list .meal-type {
      font-weight: 600;
      color: #ffd700;
      margin-right: 8px;
    }
    .meal-list .meal-nutrition {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
    }

    .exercise-list { list-style: none; }
    .exercise-list li {
      background: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
    .exercise-list .exercise-type { font-weight: 600; color: #333; }
    .exercise-list .exercise-duration { color: #667eea; font-weight: 600; }

    .loading { color: #fff; text-align: center; padding: 40px; }
    .error { color: #ff5c5c; text-align: center; padding: 40px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>健康仪表板 HM</h1>
      <button class="refresh-btn" onclick="loadData()"><span id="todayDate"></span></button>
    </header>

    <div id="app">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://zxujblakkdzcnrairhmg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_uZ42uR_6aZ7egjb_Jm7JNA_UZAlfV2i';

    // 营养成分数据库 (g/100g)
    const NUTRITION_DB = {
      "黄瓜": { "p": 0.7, "c": 2.4, "f": 0.2 },
      "鸡蛋": { "p": 13, "c": 1.1, "f": 11 },
      "水煮鸡蛋": { "p": 13, "c": 1.1, "f": 11 },
      "蛋清": { "p": 11, "c": 0.7, "f": 0.2 },
      "蛋黄": { "p": 16, "c": 3.6, "f": 28 },
      "豆浆": { "p": 3, "c": 1.2, "f": 1.8 },
      "无糖豆浆": { "p": 3, "c": 1.2, "f": 1.8 },
      "咖啡": { "p": 0.3, "c": 0, "f": 0 },
      "无糖无奶咖啡": { "p": 0.3, "c": 0, "f": 0 },
      "全麦面包": { "p": 13, "c": 41, "f": 3.4 },
      "面包": { "p": 9, "c": 49, "f": 3.2 },
      "花生酱": { "p": 25, "c": 20, "f": 50 },
      "颗粒花生酱": { "p": 25, "c": 20, "f": 50 },
      "花卷": { "p": 6.4, "c": 45, "f": 1 },
      "馒头": { "p": 7, "c": 47, "f": 1.1 },
      "包子": { "p": 8, "c": 40, "f": 5 },
      "烙饼": { "p": 6, "c": 52, "f": 2 },
      "玉米": { "p": 8, "c": 22, "f": 1.2 },
      "玉米面": { "p": 8, "c": 75, "f": 1.5 },
      "米饭": { "p": 2.6, "c": 28, "f": 0.3 },
      "白菜": { "p": 1.5, "c": 3.2, "f": 0.2 },
      "菠菜": { "p": 2.9, "c": 4.5, "f": 0.4 },
      "芹菜": { "p": 1.2, "c": 4.8, "f": 0.2 },
      "西红柿": { "p": 0.9, "c": 3.3, "f": 0.2 },
      "番茄": { "p": 0.9, "c": 3.3, "f": 0.2 },
      "青椒": { "p": 1, "c": 5.4, "f": 0.3 },
      "菜花": { "p": 2.1, "c": 4.6, "f": 0.4 },
      "蒜苔": { "p": 2.1, "c": 15, "f": 0.4 },
      "香椿": { "p": 5.7, "c": 9, "f": 0.4 },
      "胡萝卜": { "p": 1, "c": 10, "f": 0.2 },
      "豆片": { "p": 16, "c": 14, "f": 9 },
      "干豆片": { "p": 24, "c": 31, "f": 11 },
      "豆腐": { "p": 8, "c": 1.3, "f": 3.7 },
      "鸡腿": { "p": 20, "c": 0, "f": 6 },
      "煎鸡腿": { "p": 20, "c": 0, "f": 6 },
      "鸡肉": { "p": 23, "c": 0, "f": 1.2 },
      "排骨": { "p": 17, "c": 0.7, "f": 24 },
      "红烧排骨": { "p": 17, "c": 0.7, "f": 24 },
      "猪肉": { "p": 17, "c": 0, "f": 28 },
      "牛肉": { "p": 20, "c": 0, "f": 2 },
      "虾": { "p": 24, "c": 0.6, "f": 0.9 },
      "虾仁": { "p": 24, "c": 0.6, "f": 0.9 },
      "鹅蛋": { "p": 13, "c": 3.6, "f": 13 },
      "蒸鹅蛋": { "p": 13, "c": 3.6, "f": 13 },
      "香椿炒鹅蛋": { "p": 13, "c": 5, "f": 15 },
      "香椿炒鸡蛋": { "p": 10, "c": 3, "f": 12 },
      "猕猴桃": { "p": 0.8, "c": 14, "f": 0.6 },
      "苹果": { "p": 0.3, "c": 13, "f": 0.2 },
      "香蕉": { "p": 1.1, "c": 23, "f": 0.3 },
      "西瓜": { "p": 0.6, "c": 6, "f": 0.2 },
      "梨": { "p": 0.3, "c": 12, "f": 0.1 },
      "核桃": { "p": 15, "c": 14, "f": 65 },
      "熟核桃": { "p": 15, "c": 14, "f": 65 },
      "夏威夷果": { "p": 9, "c": 14, "f": 76 },
      "花生": { "p": 25, "c": 16, "f": 45 },
      "糖": { "p": 0, "c": 100, "f": 0 },
      "一块糖": { "p": 0, "c": 5, "f": 0 },
      "酸奶": { "p": 3.2, "c": 9, "f": 3.3 },
      "酸奶面包": { "p": 8, "c": 40, "f": 5 },
      "牛奶": { "p": 3.2, "c": 5, "f": 3.5 },
      "黑芝麻": { "p": 19, "c": 23, "f": 60 },
      "黑芝麻糊": { "p": 15, "c": 35, "f": 20 },
      "粉条": { "p": 0.5, "c": 84, "f": 0.1 },
      "米粉": { "p": 0.5, "c": 84, "f": 0.1 },
      "铁皮西红柿": { "p": 0.9, "c": 3.3, "f": 0.2 }
    };

    // 估算单份食物重量 (g)
    const FOOD_PORTIONS = {
      "黄瓜": 100, "半根黄瓜": 50, "一根黄瓜": 100, "一根": 100,
      "鸡蛋": 50, "一个水煮鸡蛋": 50, "两个水煮鸡蛋": 100, "两个蛋清": 60,
      "一杯": 200, "一杯无糖豆浆": 200, "一杯无糖无奶咖啡": 200,
      "一片": 30, "一个全麦面包": 30, "一片全麦面包": 30,
      "一个": 30, "一个花卷": 80, "一个小花卷": 60,
      "一个黄瓜": 100, "一根黄瓜": 100,
      "一块": 20, "一小块": 15, "两块": 30, "两三块": 40,
      "小一杯": 100, "几小口": 30
    };

    // 估算营养成分
    function estimateNutrition(foodStr) {
      let total = { p: 0, c: 0, f: 0 };
      const foods = foodStr.replace(/🥒|🥝|🍎|🍌|🍉/g, '').split(/[,，、]/);

      for (let food of foods) {
        food = food.trim();
        if (!food) continue;

        // 匹配数据库
        let nutrition = null;
        for (let key of Object.keys(NUTRITION_DB).sort((a,b) => b.length - a.length)) {
          if (food.includes(key)) {
            nutrition = NUTRITION_DB[key];
            break;
          }
        }

        // 估算份量
        let portion = 30; // 默认
        for (let k of Object.keys(FOOD_PORTIONS).sort((a,b) => b.length - a.length)) {
          if (food.includes(k)) {
            portion = FOOD_PORTIONS[k];
            break;
          }
        }
        // 数字+克/个
        const numMatch = food.match(/(\d+)[克个]/);
        if (numMatch) portion = parseInt(numMatch[1]);

        if (nutrition) {
          total.p += nutrition.p * portion / 100;
          total.c += nutrition.c * portion / 100;
          total.f += nutrition.f * portion / 100;
        } else {
          // 默认估算
          total.p += 5 * portion / 100;
          total.c += 20 * portion / 100;
          total.f += 3 * portion / 100;
        }
      }
      return total;
    }

    async function loadData() {
      const app = document.getElementById('app');
      app.innerHTML = '<div class="loading">加载中...</div>';

      try {
        const resp = await fetch(
          `${SUPABASE_URL}/rest/v1/health_data?id=eq.profile`,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
        );
        const rows = await resp.json();
        if (!rows.length || !rows[0].data) throw new Error('No data');
        const data = rows[0].data;
        render(data);
      } catch (e) {
        app.innerHTML = `<div class="error">加载失败: ${e.message}</div>`;
      }
    }

    function render(data) {
      const app = document.getElementById('app');
      const profile = data.profile;
      const logs = data.logs;
      const target = profile.goals?.target?.weight || 65;
      const currentWeight = logs.weight?.[logs.weight.length - 1]?.value || 0;
      const weightDiff = (currentWeight - target).toFixed(1);

      const today = new Date().toISOString().split('T')[0];
      const todayDiet = logs.diet?.find(d => d.date === today);
      const mealsToday = todayDiet?.meals || [];

      // 计算今日营养
      let dailyNutrition = { p: 0, c: 0, f: 0 };
      const mealsWithNutrition = mealsToday.map(m => {
        const nutrition = estimateNutrition(m.food);
        dailyNutrition.p += nutrition.p;
        dailyNutrition.c += nutrition.c;
        dailyNutrition.f += nutrition.f;
        return { ...m, nutrition };
      });

      const totalCal = dailyNutrition.p * 4 + dailyNutrition.c * 4 + dailyNutrition.f * 9;

      const weekAgo = new Date();
      weekAgo.setDate(weekAgo.getDate() - 7);
      const weekAgoStr = weekAgo.toISOString().split('T')[0];
      const weekExercises = logs.exercise?.filter(e => e.date >= weekAgoStr) || [];
      const weekExerciseMins = weekExercises.reduce((sum, e) => sum + (e.duration || 0), 0);

      const weightData = (logs.weight || []).slice(-14);
      const weightLabels = weightData.map(w => w.date.slice(5));
      const weightValues = weightData.map(w => w.value);

      app.innerHTML = `
        <div class="grid">
          <div class="card">
            <h3>当前体重</h3>
            <div class="value">${currentWeight}<span class="unit">kg</span></div>
            <div class="sub ${weightDiff <= 0 ? 'success' : 'warning'}">
              目标 ${target}kg，${weightDiff > 0 ? '还差' : '已达成'} ${Math.abs(weightDiff)}kg
            </div>
          </div>
          <div class="card">
            <h3>今日摄入</h3>
            <div class="value">${Math.round(totalCal)}<span class="unit">kcal</span></div>
            <div class="sub">${mealsToday.length} 餐</div>
          </div>
          <div class="card">
            <h3>本周运动</h3>
            <div class="value">${weekExerciseMins}<span class="unit">分钟</span></div>
            <div class="sub">${weekExercises.length} 次运动</div>
          </div>
        </div>

        <div class="chart-card">
          <h3>体重趋势</h3>
          <canvas id="weightChart"></canvas>
        </div>

        <h3 class="section-title">今日营养</h3>
        <div class="chart-card">
          <div class="nutrition-grid">
            <div class="nutrition-item">
              <div class="label">蛋白质</div>
              <div class="value protein">${Math.round(dailyNutrition.p)}<span class="unit">g</span></div>
            </div>
            <div class="nutrition-item">
              <div class="label">碳水</div>
              <div class="value carb">${Math.round(dailyNutrition.c)}<span class="unit">g</span></div>
            </div>
            <div class="nutrition-item">
              <div class="label">脂肪</div>
              <div class="value fat">${Math.round(dailyNutrition.f)}<span class="unit">g</span></div>
            </div>
          </div>
          <canvas id="nutritionChart"></canvas>
        </div>

        <h3 class="section-title">今日饮食</h3>
        <ul class="meal-list">
          ${mealsWithNutrition.length ? mealsWithNutrition.map(m => `
            <li>
              <span class="meal-type">${getMealName(m.type)}</span>${m.food}
              <div class="meal-nutrition">蛋白质 ${Math.round(m.nutrition.p)}g | 碳水 ${Math.round(m.nutrition.c)}g | 脂肪 ${Math.round(m.nutrition.f)}g</div>
            </li>
          `).join('') : '<li>暂无记录</li>'}
        </ul>

        <h3 class="section-title">本周运动</h3>
        <ul class="exercise-list">
          ${weekExercises.length ? weekExercises.map(e => `
            <li>
              <span class="exercise-type">${e.type}</span>
              <span class="exercise-duration">${e.duration}分钟</span>
            </li>
          `).join('') : '<li>暂无记录</li>'}
        </ul>
      `;

      // 体重趋势图
      const weightCtx = document.getElementById('weightChart');
      if (weightCtx && weightValues.length) {
        new Chart(weightCtx, {
          type: 'line',
          data: {
            labels: weightLabels,
            datasets: [{
              label: '体重 (kg)',
              data: weightValues,
              borderColor: '#667eea',
              backgroundColor: 'rgba(102, 126, 234, 0.1)',
              fill: true,
              tension: 0.3,
              pointRadius: 6,
              pointBackgroundColor: '#667eea'
            }, {
              label: '目标',
              data: Array(weightLabels.length).fill(target),
              borderColor: '#10b981',
              borderDash: [5, 5],
              pointRadius: 0,
              fill: false
            }]
          },
          options: {
            responsive: true,
            plugins: { legend: { position: 'top' } },
            scales: {
              y: {
                min: Math.min(target - 3, ...weightValues) - 1,
                max: Math.max(target + 3, ...weightValues) + 1
              }
            }
          }
        });
      }

      // 营养成分饼图
      const nutritionCtx = document.getElementById('nutritionChart');
      if (nutritionCtx && totalCal > 0) {
        new Chart(nutritionCtx, {
          type: 'doughnut',
          data: {
            labels: ['蛋白质', '碳水', '脂肪'],
            datasets: [{
              data: [
                dailyNutrition.p * 4,
                dailyNutrition.c * 4,
                dailyNutrition.f * 9
              ],
              backgroundColor: ['#ef4444', '#f59e0b', '#3b82f6']
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: { position: 'bottom' }
            }
          }
        });
      }
    }

    function getMealName(type) {
      const map = { breakfast: '早餐', lunch: '午餐', dinner: '晚餐', snack: '零食' };
      return map[type] || type;
    }

    document.getElementById('todayDate').textContent = new Date().toISOString().split('T')[0];
    loadData();
  </script>
</body>
</html>
